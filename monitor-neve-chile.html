<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Monitor de Neve Chile • V3</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:#0f172a;
    color:white;
}

.hero{
    height:35vh;
    background:
        linear-gradient(rgba(0,0,0,.55),rgba(0,0,0,.65)),
        url('https://images.unsplash.com/photo-1483728642387-6c3bdd6c93e5?auto=format&fit=crop&w=1600&q=80');
    background-size:cover;
    background-position:center;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    flex-direction:column;
}

.hero h1{
    font-size:3rem;
}

.hero p{
    margin-top:10px;
    color:#e2e8f0;
}

.container{
    max-width:1100px;
    margin:auto;
    padding:40px 20px;
}

.back{
    display:inline-block;
    margin-bottom:25px;
    color:#93c5fd;
    text-decoration:none;
}

.card{
    background:#1e293b;
    border-radius:18px;
    padding:25px;
    margin-bottom:20px;
}

.card h2{
    color:#60a5fa;
    margin-bottom:12px;
}

.info{
    line-height:1.8;
    color:#e2e8f0;
}

.badge{
    display:inline-block;
    margin-top:12px;
    padding:6px 14px;
    border-radius:999px;
    font-weight:bold;
}

.good{ background:#16a34a; }
.medium{ background:#ca8a04; }
.bad{ background:#dc2626; }

.rank{
    margin-top:30px;
    background:#1e293b;
    padding:25px;
    border-radius:18px;
}

.rank h2{
    color:#60a5fa;
    margin-bottom:15px;
}

.small{
    color:#94a3b8;
    font-size:0.9rem;
}

</style>
</head>

<body>

<section class="hero">
    <h1>❄️ Snow Engine V3</h1>
    <p>Decisão real de ski no Chile</p>
</section>

<div class="container">

<a class="back" href="index.html">
← Voltar
</a>

<div id="resorts"></div>

<div class="rank">
    <h2>🏆 Melhor decisão de hoje</h2>
    <div id="ranking">Carregando...</div>
</div>

</div>

<script>

const resorts = [
{
    nome:"Valle Nevado",
    lat:-33.354,
    lon:-70.250,
    altitude:3200
},
{
    nome:"Farellones",
    lat:-33.352,
    lon:-70.289,
    altitude:2400
},
{
    nome:"Portillo",
    lat:-32.844,
    lon:-70.130,
    altitude:2900
}
];

// 🎯 Snow Score V3 (mais realista)
function snowScore(tMax, tMin, precip, snow, altitude){

    let score = 0;

    // 🌡️ temperatura (fator principal)
    if(tMax <= -2) score += 40;
    else if(tMax <= 2) score += 25;
    else if(tMax <= 5) score += 10;

    if(tMin <= -8) score += 10;

    // ☁️ precipitação (neve provável)
    score += precip * 0.3;

    // ❄️ snowfall previsto (peso reduzido)
    score += snow * 1.0;

    // 🏔️ base de neve simulada (por altitude + clima)
    let baseSnow = altitude / 200; // proxy simples
    score += Math.min(20, baseSnow);

    return Math.max(0, Math.min(100, score));
}

// 🌨️ índice de powder (diferencial da V3)
function powderIndex(score, snow, precip){

    return (score * 0.6) + (snow * 5) + (precip * 0.2);
}

function classify(score){

    if(score >= 70){
        return { text:"🟢 Dia excelente de ski", cls:"good" };
    }

    if(score >= 40){
        return { text:"🟡 Condições ok", cls:"medium" };
    }

    return { text:"🔴 Não recomendado", cls:"bad" };
}

async function load(){

    const container = document.getElementById("resorts");
    const rankingBox = document.getElementById("ranking");

    container.innerHTML = "";
    rankingBox.innerHTML = "Carregando...";

    let ranking = [];

    for(const r of resorts){

        const url =
`https://api.open-meteo.com/v1/forecast?latitude=${r.lat}&longitude=${r.lon}&daily=temperature_2m_max,temperature_2m_min,snowfall_sum,precipitation_probability_max&forecast_days=1&timezone=America/Santiago`;

        const res = await fetch(url);
        const data = await res.json();

        const tMax = data.daily.temperature_2m_max[0];
        const tMin = data.daily.temperature_2m_min[0];
        const snow = data.daily.snowfall_sum[0] || 0;
        const precip = data.daily.precipitation_probability_max[0] || 0;

        const score = snowScore(tMax,tMin,precip,snow,r.altitude);
        const powder = powderIndex(score,snow,precip);

        ranking.push({ nome:r.nome, score, powder });

        const status = classify(score);

        container.innerHTML += `
        <div class="card">
            <h2>${r.nome}</h2>

            <div class="info">
                🌡️ Máx: ${tMax}°C<br>
                🌡️ Mín: ${tMin}°C<br>
                ☁️ Precipitação: ${precip}%<br>
                ❄️ Snowfall: ${snow} cm<br>
                🏔️ Altitude base: ${r.altitude} m<br><br>

                🧠 Snow Score: <b>${score.toFixed(1)}</b><br>
                🌨️ Powder Index: <b>${powder.toFixed(1)}</b><br>

                <div class="badge ${status.cls}">
                    ${status.text}
                </div>

                <div class="small">
                    Índice de decisão combinando neve + frio + altitude
                </div>
            </div>
        </div>
        `;
    }

    ranking.sort((a,b)=>b.powder-a.powder);

    rankingBox.innerHTML =
        ranking.map((r,i)=>{

            const medal =
                ["🥇","🥈","🥉"][i] || "🏔️";

            return `${medal} ${r.nome}
            — Score ${r.score.toFixed(1)}
            — Powder ${r.powder.toFixed(1)}<br><br>`;
        }).join("");
}

load();
setInterval(load, 1800000);

</script>

</body>
</html>
