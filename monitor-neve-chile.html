<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Snow Decision V9 • Chile</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:#0f172a;
    color:white;
}

.hero{
    height:35vh;
    background:
        linear-gradient(rgba(0,0,0,.55),rgba(0,0,0,.65)),
        url('https://images.unsplash.com/photo-1483728642387-6c3bdd6c93e5?auto=format&fit=crop&w=1600&q=80');
    background-size:cover;
    background-position:center;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
}

.hero h1{
    font-size:2.6rem;
}

.hero p{
    margin-top:10px;
    color:#e2e8f0;
    font-size:1rem;
}

.container{
    max-width:1200px;
    margin:auto;
    padding:40px 20px;
}

.back{
    display:inline-block;
    margin-bottom:20px;
    color:#93c5fd;
    text-decoration:none;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(340px,1fr));
    gap:16px;
}

.card{
    background:#1e293b;
    border-radius:18px;
    padding:20px;
    box-shadow:0 4px 12px rgba(0,0,0,.25);
}

.card h2{
    color:#60a5fa;
    margin-bottom:10px;
}

.badge{
    display:inline-block;
    margin-top:10px;
    margin-bottom:10px;
    padding:6px 12px;
    border-radius:999px;
    font-weight:bold;
}

.good{
    background:#16a34a;
}

.medium{
    background:#ca8a04;
}

.bad{
    background:#dc2626;
}

.section{
    margin-top:30px;
    background:#1e293b;
    padding:20px;
    border-radius:18px;
}

.section h2{
    color:#60a5fa;
    margin-bottom:10px;
}

.line{
    padding:8px 0;
    border-bottom:1px solid #334155;
}

.small{
    color:#94a3b8;
    font-size:0.9rem;
    margin-top:10px;
}

.snowdepth{
    margin-top:6px;
    font-weight:bold;
    color:#bfdbfe;
    font-size:1.05rem;
}

.livecam{
    margin-top:15px;
    border-radius:12px;
    overflow:hidden;
}

.livecam iframe{
    width:100%;
    height:260px;
    border:none;
    background:#000;
}

.fullscreen-btn{
    display:block;
    margin-top:10px;
    text-align:center;
    background:#2563eb;
    color:white;
    padding:10px;
    border-radius:10px;
    text-decoration:none;
    font-weight:bold;
    transition:.2s;
}

.fullscreen-btn:hover{
    background:#1d4ed8;
}

</style>
</head>

<body>

<section class="hero">
    <h1>❄️ Snow Decision V9</h1>
    <p>Neve acumulada + neve prevista + temperatura</p>
</section>

<div class="container">

    <a class="back" href="index.html">← Voltar</a>

    <div id="stations" class="grid"></div>

    <div class="section">
        <h2>📅 Timeline de decisão</h2>
        <div id="timeline"></div>
    </div>

</div>

<script>
    const resorts = [
{
    nome:"Valle Nevado",
    lat:-33.354,
    lon:-70.250,
    altitude:3200,
    liveEmbed:"https://www.youtube.com/embed/tWNxInShxZI?autoplay=1&mute=1",
    liveLink:"https://www.youtube.com/live/tWNxInShxZI"
},
{
    nome:"Farellones",
    lat:-33.352,
    lon:-70.289,
    altitude:2400,
    liveEmbed:"https://www.youtube.com/embed/FpsDkNhcyl0?autoplay=1&mute=1",
    liveLink:"https://www.youtube.com/live/H6pdtCpN5N0"
},
{
    nome:"Portillo",
    lat:-32.844,
    lon:-70.130,
    altitude:2900,
    liveEmbed:"https://g3.ipcamlive.com/player/player.php?alias=laguna&autoplay=1",
    liveLink:"https://g3.ipcamlive.com/player/player.php?alias=laguna&autoplay=1"
}
];

function snowScore(tMax,tMin,precip,snow,depth,alt){

    let score = 0;

    // Neve acumulada (peso principal)

    if(depth >= 200){
        score += 60;
    }
    else if(depth >= 150){
        score += 50;
    }
    else if(depth >= 100){
        score += 40;
    }
    else if(depth >= 50){
        score += 25;
    }
    else if(depth >= 20){
        score += 15;
    }

    // Neve nova prevista

    score += Math.min(30, snow * 3);

    // Temperatura

    if(tMax <= 0){
        score += 15;
    }
    else if(tMax <= 3){
        score += 10;
    }
    else if(tMax <= 6){
        score += 5;
    }

    // Pequeno bônus de altitude

    score += Math.min(5, alt / 1000);

    return Math.min(100, Math.max(0, score));
}

function classify(score){

    if(score >= 70) return "🟢 Excelente";
    if(score >= 40) return "🟡 Boa";
    return "🔴 Fraca";
}

function icon(score){

    if(score >= 70) return "🟢";
    if(score >= 40) return "🟡";
    return "🔴";
}

function format(date){

    return new Date(date).toLocaleDateString(
        "pt-BR",
        {
            day:"2-digit",
            month:"2-digit"
        }
    );
}

async function load(){

    const stations = document.getElementById("stations");
    const timeline = document.getElementById("timeline");

    stations.innerHTML = "";
    timeline.innerHTML = "";

    let all = {};

    for(const r of resorts){

        const url =
`https://api.open-meteo.com/v1/forecast?latitude=${r.lat}&longitude=${r.lon}&daily=temperature_2m_max,temperature_2m_min,snowfall_sum,snow_depth,precipitation_probability_max&forecast_days=10&timezone=America/Santiago`;

        const res = await fetch(url);
        const data = await res.json();

        let html = "";

        for(let i=0;i<data.daily.time.length;i++){

            const tMax =
                data.daily.temperature_2m_max[i];

            const tMin =
                data.daily.temperature_2m_min[i];

            const snow =
                data.daily.snowfall_sum[i] || 0;

            // Se sua API retornar em metros, multiplicar por 100.
            // Se já estiver retornando em cm, remova o *100.
            const depth =
                (data.daily.snow_depth[i] || 0) * 100;

            const precip =
                data.daily.precipitation_probability_max[i] || 0;

            const score =
                snowScore(
                    tMax,
                    tMin,
                    precip,
                    snow,
                    depth,
                    r.altitude
                );

            if(i === 0){

                html += `
                <div class="card">

                    <h2>${r.nome}</h2>

                    🌡️ Máx: ${tMax}°C<br>
                    🌡️ Mín: ${tMin}°C<br>
                    ☁️ Precipitação: ${precip}%<br>
                    ❄️ Neve prevista: ${snow} cm<br>
                    🏔️ Neve acumulada: ${depth.toFixed(0)} cm<br><br>

                    🧠 Score: <b>${score.toFixed(1)}</b><br>

                    <div class="badge ${
                        score >= 70 ? "good" :
                        score >= 40 ? "medium" :
                        "bad"
                    }">
                        ${classify(score)}
                    </div>

                    <div class="small">
                        Score baseado em neve acumulada,
                        neve prevista e temperatura.
                    </div>

                    <div class="livecam">
                        <iframe
                            src="${r.liveEmbed}"
                            allowfullscreen
                            loading="lazy">
                        </iframe>
                    </div>

                    <a
                        class="fullscreen-btn"
                        href="${r.liveLink}"
                        target="_blank">
                        🔍 Abrir transmissão
                    </a>

                </div>
                `;
            }

            if(!all[r.nome]){
                all[r.nome] = [];
            }

            all[r.nome].push({
                date:data.daily.time[i],
                score:score
            });
        }

        stations.innerHTML += html;
    }

    for(const name in all){

        timeline.innerHTML +=
        `<h3 style="margin-top:15px;color:#93c5fd">${name}</h3>`;

        for(const d of all[name]){

            timeline.innerHTML += `
            <div class="line">
                ${format(d.date)}
                —
                ${icon(d.score)}
                Score ${d.score.toFixed(0)}
            </div>
            `;
        }
    }
}

load();

setInterval(load,1800000);
</script>

</body>
</html>
