<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Snow Decision V5 • Chile</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:#0f172a;
    color:white;
}

.hero{
    height:35vh;
    background:
        linear-gradient(rgba(0,0,0,.55),rgba(0,0,0,.65)),
        url('https://images.unsplash.com/photo-1483728642387-6c3bdd6c93e5?auto=format&fit=crop&w=1600&q=80');
    background-size:cover;
    background-position:center;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    flex-direction:column;
}

.hero h1{
    font-size:2.8rem;
}

.hero p{
    margin-top:10px;
    color:#e2e8f0;
}

.container{
    max-width:1100px;
    margin:auto;
    padding:40px 20px;
}

.back{
    display:inline-block;
    margin-bottom:20px;
    color:#93c5fd;
    text-decoration:none;
}

.card{
    background:#1e293b;
    border-radius:18px;
    padding:22px;
    margin-bottom:18px;
}

.card h2{
    color:#60a5fa;
    margin-bottom:10px;
}

.info{
    line-height:1.7;
    color:#e2e8f0;
}

.badge{
    display:inline-block;
    margin-top:10px;
    padding:6px 12px;
    border-radius:999px;
    font-weight:bold;
}

.good{ background:#16a34a; }
.medium{ background:#ca8a04; }
.bad{ background:#dc2626; }

.section{
    margin-top:30px;
    background:#1e293b;
    padding:22px;
    border-radius:18px;
}

.section h2{
    color:#60a5fa;
    margin-bottom:12px;
}

.timeline-item{
    padding:10px 0;
    border-bottom:1px solid #334155;
}

.highlight{
    background:#0ea5e9;
    color:#001018;
    padding:2px 8px;
    border-radius:6px;
    font-weight:bold;
}

.small{
    font-size:0.9rem;
    color:#94a3b8;
}

</style>
</head>

<body>

<section class="hero">
    <h1>❄️ Snow Decision V5</h1>
    <p>Quando e onde subir a montanha no Chile</p>
</section>

<div class="container">

<a class="back" href="index.html">← Voltar</a>

<div id="resorts"></div>

<div class="section">
    <h2>🏆 Melhor estação hoje</h2>
    <div id="ranking">Carregando...</div>
</div>

<div class="section">
    <h2>📅 Timeline de decisão (10 dias)</h2>
    <div id="timeline">Carregando...</div>
</div>

<div class="section">
    <h2>🔥 Melhor dia da semana</h2>
    <div id="bestDay">Carregando...</div>
</div>

</div>

<script>

const resorts = [
{
    nome:"Valle Nevado",
    lat:-33.354,
    lon:-70.250,
    altitude:3200
},
{
    nome:"Farellones",
    lat:-33.352,
    lon:-70.289,
    altitude:2400
},
{
    nome:"Portillo",
    lat:-32.844,
    lon:-70.130,
    altitude:2900
}
];

// 🧠 Snow Score V5 (mais estável e realista)
function snowScore(tMax, tMin, precip, snow, altitude){

    let score = 0;

    // frio (principal)
    if(tMax <= -3) score += 45;
    else if(tMax <= 2) score += 25;
    else if(tMax <= 6) score += 10;

    if(tMin <= -8) score += 10;

    // precipitação (chance de neve)
    score += precip * 0.3;

    // snowfall (peso moderado)
    score += snow * 1.2;

    // altitude (base de neve natural)
    score += Math.min(20, altitude / 180);

    return Math.min(100, Math.max(0, score));
}

// 🌨️ Powder Index (qualidade real de neve)
function powderIndex(score, snow, precip){

    return (score * 0.55) + (snow * 6) + (precip * 0.25);
}

function classify(score){

    if(score >= 70) return { txt:"🟢 Excelente", cls:"good" };
    if(score >= 40) return { txt:"🟡 Ok", cls:"medium" };
    return { txt:"🔴 Fraco", cls:"bad" };
}

function formatDate(dateStr){

    const d = new Date(dateStr);
    return d.toLocaleDateString("pt-BR",{day:"2-digit",month:"2-digit"});
}

let globalTimeline = [];

async function load(){

    const container = document.getElementById("resorts");
    const rankingBox = document.getElementById("ranking");
    const timelineBox = document.getElementById("timeline");
    const bestDayBox = document.getElementById("bestDay");

    container.innerHTML = "";
    rankingBox.innerHTML = "Carregando...";
    timelineBox.innerHTML = "Carregando...";
    bestDayBox.innerHTML = "Carregando...";

    let ranking = [];

    let timelineAgg = [];

    for(const r of resorts){

        const url =
`https://api.open-meteo.com/v1/forecast?latitude=${r.lat}&longitude=${r.lon}&daily=temperature_2m_max,temperature_2m_min,snowfall_sum,precipitation_probability_max&forecast_days=10&timezone=America/Santiago`;

        const res = await fetch(url);
        const data = await res.json();

        let totalScore = 0;

        for(let i=0;i<data.daily.time.length;i++){

            const tMax = data.daily.temperature_2m_max[i];
            const tMin = data.daily.temperature_2m_min[i];
            const snow = data.daily.snowfall_sum[i] || 0;
            const precip = data.daily.precipitation_probability_max[i] || 0;

            const score = snowScore(tMax,tMin,precip,snow,r.altitude);

            totalScore += score;

            if(!timelineAgg[i]){
                timelineAgg[i] = {
                    date: data.daily.time[i],
                    score: score
                };
            }else{
                timelineAgg[i].score += score;
            }
        }

        ranking.push({
            nome:r.nome,
            score: totalScore
        });
    }

    // 🏔️ ranking estações
    ranking.sort((a,b)=>b.score-a.score);

    rankingBox.innerHTML = ranking.map((r,i)=>{

        const medal = ["🥇","🥈","🥉"][i] || "🏔️";

        return `${medal} ${r.nome} — ${r.score.toFixed(0)}<br><br>`;
    }).join("");

    // 📅 timeline global
    let bestDay = { score:0, date:"" };

    timelineBox.innerHTML = timelineAgg.map(d=>{

        const cls =
            d.score >= 200 ? "🟢" :
            d.score >= 120 ? "🟡" : "🔴";

        if(d.score > bestDay.score){
            bestDay = d;
        }

        return `
        <div class="timeline-item">
            ${formatDate(d.date)} — ${cls}
            Score: ${d.score.toFixed(0)}
        </div>
        `;
    }).join("");

    // 🔥 melhor dia
    bestDayBox.innerHTML = `
        <div class="highlight">
            ${formatDate(bestDay.date)} — Score ${bestDay.score.toFixed(0)}
        </div>
        <br>
        <div class="small">
            Melhor janela para ski na viagem (baseado em neve + frio + altitude)
        </div>
    `;
}

load();
setInterval(load, 1800000);

</script>

</body>
</html>
