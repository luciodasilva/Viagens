<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Monitor de Neve Chile • V2</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:#0f172a;
    color:white;
}

.hero{
    height:35vh;
    background:
        linear-gradient(rgba(0,0,0,.55),rgba(0,0,0,.65)),
        url('https://images.unsplash.com/photo-1483728642387-6c3bdd6c93e5?auto=format&fit=crop&w=1600&q=80');
    background-size:cover;
    background-position:center;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    flex-direction:column;
}

.hero h1{
    font-size:3rem;
}

.hero p{
    margin-top:10px;
    color:#e2e8f0;
}

.container{
    max-width:1100px;
    margin:auto;
    padding:40px 20px;
}

.back{
    display:inline-block;
    margin-bottom:25px;
    color:#93c5fd;
    text-decoration:none;
}

.card{
    background:#1e293b;
    border-radius:18px;
    padding:25px;
    margin-bottom:20px;
}

.card h2{
    color:#60a5fa;
    margin-bottom:12px;
}

.info{
    line-height:1.8;
    color:#e2e8f0;
}

.badge{
    display:inline-block;
    margin-top:12px;
    padding:6px 14px;
    border-radius:999px;
    font-weight:bold;
}

.good{ background:#16a34a; }
.medium{ background:#ca8a04; }
.bad{ background:#dc2626; }

.rank{
    margin-top:30px;
    background:#1e293b;
    padding:25px;
    border-radius:18px;
}

.rank h2{
    color:#60a5fa;
    margin-bottom:15px;
}

</style>
</head>

<body>

<section class="hero">
    <h1>❄️ Monitor de Neve</h1>
    <p>Valle Nevado • Farellones • Portillo</p>
</section>

<div class="container">

<a class="back" href="index.html">
← Voltar para Memórias de Viagem
</a>

<div id="resorts"></div>

<div class="rank">
    <h2>🏆 Ranking de Condições de Neve</h2>
    <div id="ranking">Carregando...</div>
</div>

</div>

<script>

const resorts = [
{
    nome:"Valle Nevado",
    lat:-33.354,
    lon:-70.250
},
{
    nome:"Farellones",
    lat:-33.352,
    lon:-70.289
},
{
    nome:"Portillo",
    lat:-32.844,
    lon:-70.130
}
];

// Snow Score mais realista (0–100)
function snowScore(tMax, tMin, precipProb, snowfall){

    let score = 0;

    // frio é essencial
    if(tMax < 0) score += 45;
    else if(tMax < 3) score += 25;
    else if(tMax < 6) score += 10;

    // frio noturno ajuda estabilidade
    if(tMin < -5) score += 10;

    // probabilidade de precipitação
    score += (precipProb * 0.25);

    // snowfall do modelo (peso reduzido)
    score += snowfall * 1.2;

    return Math.min(100, Math.max(0, score));
}

function classify(score){

    if(score >= 70){
        return { text:"🟢 Excelente para neve", cls:"good" };
    }

    if(score >= 40){
        return { text:"🟡 Condições moderadas", cls:"medium" };
    }

    return { text:"🔴 Fraco / seco", cls:"bad" };
}

async function load(){

    const container = document.getElementById("resorts");
    const rankingBox = document.getElementById("ranking");

    container.innerHTML = "";
    rankingBox.innerHTML = "Carregando...";

    let ranking = [];

    for(const r of resorts){

        const url =
`https://api.open-meteo.com/v1/forecast?latitude=${r.lat}&longitude=${r.lon}&daily=temperature_2m_max,temperature_2m_min,snowfall_sum,precipitation_probability_max&forecast_days=1&timezone=America/Santiago`;

        try{

            const res = await fetch(url);
            const data = await res.json();

            const tMax = data.daily.temperature_2m_max[0];
            const tMin = data.daily.temperature_2m_min[0];
            const snow = data.daily.snowfall_sum[0] || 0;
            const precip = data.daily.precipitation_probability_max[0] || 0;

            const score = snowScore(tMax,tMin,precip,snow);
            const status = classify(score);

            ranking.push({ nome:r.nome, score });

            container.innerHTML += `
            <div class="card">
                <h2>${r.nome}</h2>

                <div class="info">
                    🌡️ Máx: ${tMax}°C<br>
                    🌡️ Mín: ${tMin}°C<br>
                    ☁️ Precipitação: ${precip}%<br>
                    ❄️ Snowfall estimado: ${snow} cm<br>
                    🧠 Snow Score: <b>${score.toFixed(1)}</b>

                    <div class="badge ${status.cls}">
                        ${status.text}
                    </div>
                </div>
            </div>
            `;
        }
        catch(e){
            container.innerHTML += `
            <div class="card">
                <h2>${r.nome}</h2>
                <div class="info">Erro ao carregar dados.</div>
            </div>
            `;
        }
    }

    ranking.sort((a,b)=>b.score-a.score);

    rankingBox.innerHTML =
        ranking.map((r,i)=>{

            const medal =
                ["🥇","🥈","🥉"][i] || "🏔️";

            return `${medal} ${r.nome} — ${r.score.toFixed(1)}<br><br>`;
        }).join("");
}

load();
setInterval(load, 1800000);

</script>

</body>
</html>
