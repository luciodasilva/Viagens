<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Snow Decision V8 • Chile</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:#0f172a;
    color:white;
}

.hero{
    height:35vh;
    background:
        linear-gradient(rgba(0,0,0,.55),rgba(0,0,0,.65)),
        url('https://images.unsplash.com/photo-1483728642387-6c3bdd6c93e5?auto=format&fit=crop&w=1600&q=80');
    background-size:cover;
    background-position:center;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
}

.hero h1{
    font-size:2.6rem;
}

.hero p{
    margin-top:10px;
    color:#e2e8f0;
}

.container{
    max-width:1200px;
    margin:auto;
    padding:40px 20px;
}

.back{
    display:inline-block;
    margin-bottom:20px;
    color:#93c5fd;
    text-decoration:none;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(340px,1fr));
    gap:16px;
}

.card{
    background:#1e293b;
    border-radius:18px;
    padding:20px;
}

.card h2{
    color:#60a5fa;
    margin-bottom:10px;
}

.badge{
    display:inline-block;
    margin-top:10px;
    margin-bottom:10px;
    padding:6px 12px;
    border-radius:999px;
    font-weight:bold;
}

.good{
    background:#16a34a;
}

.medium{
    background:#ca8a04;
}

.bad{
    background:#dc2626;
}

.section{
    margin-top:30px;
    background:#1e293b;
    padding:20px;
    border-radius:18px;
}

.section h2{
    color:#60a5fa;
    margin-bottom:10px;
}

.line{
    padding:8px 0;
    border-bottom:1px solid #334155;
}

.small{
    color:#94a3b8;
    font-size:0.9rem;
    margin-top:10px;
}

.livecam{
    margin-top:15px;
    border-radius:12px;
    overflow:hidden;
}

.livecam iframe{
    width:100%;
    height:220px;
    border:none;
    background:#000;
}

.fullscreen-btn{
    display:block;
    margin-top:10px;
    text-align:center;
    background:#2563eb;
    color:white;
    padding:10px;
    border-radius:10px;
    text-decoration:none;
    font-weight:bold;
    transition:.2s;
}

.fullscreen-btn:hover{
    background:#1d4ed8;
}

</style>
</head>

<body>

<section class="hero">
    <h1>❄️ Snow Decision V8</h1>
    <p>Versão corrigida — foco em neve REAL</p>
</section>

<div class="container">

<a class="back" href="index.html">← Voltar</a>

<div id="stations" class="grid"></div>

<div class="section">
    <h2>📅 Timeline de decisão (corrigida)</h2>
    <div id="timeline"></div>
</div>

</div>

<script>

const resorts = [
{
    nome:"Valle Nevado",
    lat:-33.354,
    lon:-70.250,
    altitude:3200,
    liveEmbed:"https://www.youtube.com/embed/tWNxInShxZI?autoplay=1&#038;mute=1",
    liveLink:"https://www.youtube.com/live/tWNxInShxZI?autoplay=1&#038;mute=1"
},
{
    nome:"Farellones",
    lat:-33.352,
    lon:-70.289,
    altitude:2400,
    liveEmbed:"https://www.youtube.com/embed/zei7KgByE7o?si=LAmgq3hHrTVtY4Pc?autoplay=1&#038;mute=1",
    liveLink:"https://www.youtube.com/live/H6pdtCpN5N0?autoplay=1&#038;mute=1"
},
{
    nome:"Portillo",
    lat:-32.844,
    lon:-70.130,
    altitude:2900,
    liveEmbed:"https://g3.ipcamlive.com/player/player.php?alias=laguna&autoplay=1",
    liveLink:"https://g3.ipcamlive.com/player/player.php?alias=laguna&autoplay=1"
}
];

// V8 - Score ajustado para neve real

function snowScore(tMax,tMin,precip,snow,alt){

    let score = 0;

    score += snow * 4.5;

    if(tMax <= 0 && precip > 0){
        score += precip * 0.6;
    }

    if(tMax <= -2 && tMax >= -10){
        score += 30;
    }
    else if(tMax <= 2){
        score += 15;
    }
    else{
        score -= 15;
    }

    if(tMax < -10){
        score -= 5;
    }

    score += Math.min(10,alt/500);

    return Math.min(100,Math.max(0,score));
}

function classify(score){

    if(score >= 70) return "🟢 Dia excelente de neve";
    if(score >= 40) return "🟡 Condições ok";
    return "🔴 Fraco / seco";
}

function icon(score){

    if(score >= 70) return "🟢";
    if(score >= 40) return "🟡";
    return "🔴";
}

function format(date){

    return new Date(date).toLocaleDateString(
        "pt-BR",
        {
            day:"2-digit",
            month:"2-digit"
        }
    );
}

async function load(){

    const stations = document.getElementById("stations");
    const timeline = document.getElementById("timeline");

    stations.innerHTML = "";
    timeline.innerHTML = "";

    let all = {};

    for(const r of resorts){

        const url =
`https://api.open-meteo.com/v1/forecast?latitude=${r.lat}&longitude=${r.lon}&daily=temperature_2m_max,temperature_2m_min,snowfall_sum,precipitation_probability_max&forecast_days=10&timezone=America/Santiago`;

        const res = await fetch(url);
        const data = await res.json();

        let html = "";

        for(let i=0;i<data.daily.time.length;i++){

            const tMax =
                data.daily.temperature_2m_max[i];

            const tMin =
                data.daily.temperature_2m_min[i];

            const snow =
                data.daily.snowfall_sum[i] || 0;

            const precip =
                data.daily.precipitation_probability_max[i] || 0;

            const score =
                snowScore(
                    tMax,
                    tMin,
                    precip,
                    snow,
                    r.altitude
                );

            if(i === 0){

                html += `
                <div class="card">

                    <h2>${r.nome}</h2>

                    🌡️ Máx: ${tMax}°C<br>
                    🌡️ Mín: ${tMin}°C<br>
                    ☁️ Precipitação: ${precip}%<br>
                    ❄️ Neve prevista: ${snow} cm<br><br>

                    🧠 Score: <b>${score.toFixed(1)}</b><br>

                    <div class="badge">
                        ${classify(score)}
                    </div>

                    <div class="small">
                        Score baseado principalmente em neve real prevista.
                    </div>

                    <div class="livecam">
                        <iframe
                            src="${r.liveEmbed}"
                            allowfullscreen
                            loading="lazy">
                        </iframe>
                    </div>

                    <a
                        class="fullscreen-btn"
                        href="${r.liveLink}"
                        target="_blank">
                        🔍 Abrir transmissão
                    </a>

                </div>
                `;
            }

            if(!all[r.nome]){
                all[r.nome] = [];
            }

            all[r.nome].push({
                date:data.daily.time[i],
                score:score
            });
        }

        stations.innerHTML += html;
    }

    for(const name in all){

        timeline.innerHTML +=
        `<h3 style="margin-top:15px;color:#93c5fd">${name}</h3>`;

        for(const d of all[name]){

            timeline.innerHTML += `
            <div class="line">
                ${format(d.date)}
                —
                ${icon(d.score)}
                Score ${d.score.toFixed(0)}
            </div>
            `;
        }
    }
}

load();

setInterval(
    load,
    1800000
);

</script>

</body>
</html>
